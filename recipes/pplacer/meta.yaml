{% set name = "pplacer" %}
{% set version = "1.1.alpha20" %}

package:
  name: pplacer
  version: '{{ version }}'

source:
  url: https://github.com/matsen/pplacer/releases/download/v{{ version }}/pplacer-linux-arm64.zip    # [linux and aarch64]
  sha256: 8ba2f791cb98077c9ff3a72ada8f159dd5b1702867e5d598ad4299a8d4a0d13e                          # [linux and aarch64]
  url: https://github.com/matsen/pplacer/releases/download/v{{ version }}/pplacer-macos-arm64.zip    # [osx and arm64]
  sha256: 0c7bc46ae1225b91e27983c0bddb6354b2d843ab4409d542dca87de1e83a33fb                          # [osx and arm64]
  url: https://github.com/matsen/pplacer/releases/download/v{{ version }}/pplacer-linux-x86_64.zip   # [linux and x86_64]
  sha256: 1c3edd7070f11f172fbeb6202374026c1446593c83fdfb445ae553f62cb20dd6                          # [linux and x86_64]

build:
  skip: true   # [osx and x86_64]
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin=None) }}


requirements:
  run:
    - gsl =2.7     # [linux]
    - gsl          # [osx]

test:
  commands:
    - pplacer --help > /dev/null
    - guppy to_csv --help > /dev/null
    - rppr check --help > /dev/null

about:
  home: http://matsen.fredhutch.org/pplacer/
  license: GPL-3.0
  license_family: GPL
  summary: Pplacer places query sequences on a fixed reference phylogenetic tree to
    maximize phylogenetic likelihood or posterior probability according to a reference
    alignment.
  dev_url: https://github.com/matsen/pplacer/

extra:
  skip-lints:
    - should_be_noarch_generic
